# Determine whether a reboot is required after patching.
# Ubuntu and Amazon Linux use different mechanisms.

- name: Check if reboot is required on Debian systems
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Ensure dnf-utils is installed on RedHat systems
  ansible.builtin.dnf:
    name: dnf-utils
    state: present
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Check if reboot is required on RedHat systems
  ansible.builtin.command:
    cmd: needs-restarting -r
  register: reboot_check
  failed_when: false
  changed_when: false
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Display reboot requirement
  ansible.builtin.debug:
    msg:
      - "Debian reboot required: {{ reboot_required.stat.exists | default(false) }}"
      - "RedHat reboot required: {{ reboot_check.rc | default(0) == 1 }}"

- name: Reboot Debian systems if required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible after patching."
    reboot_timeout: 300
  when:
    - ansible_facts['os_family'] == 'Debian'
    - reboot_required.stat.exists

- name: Reboot RedHat systems if required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible after patching."
    reboot_timeout: 300
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - reboot_check.rc == 1
