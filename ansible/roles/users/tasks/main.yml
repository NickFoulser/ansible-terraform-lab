---

- name: Create admins group
  ansible.builtin.group:
    name: admins
    state: present

- name: Ensure admin users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: admins
    append: true
    shell: "{{ item.shell }}"
    state: present
  loop: "{{ admin_users }}"

- name: Ensure admin users have sudo privileges
  ansible.builtin.copy:
    dest: /etc/sudoers.d/admins
    content: '%admins ALL=(ALL) NOPASSWD: ALL'
    owner: root
    group: root
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'

- name: Create wasdeploy group
  ansible.builtin.group:
    name: wasdeploy
    state: present

- name: Ensure application users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell:  "{{ item.shell }}"
    groups: wasdeploy
    append: true
    state: present
  loop: "{{ app_users }}"

- name: Create ops group
  ansible.builtin.group:
    name: ops
    state: present

- name: Ensure ops users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: ops
    append: true
    shell: "{{ item.shell }}"
    state: present
  loop: "{{ ops_users }}"

