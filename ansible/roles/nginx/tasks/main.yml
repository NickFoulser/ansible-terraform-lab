---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure nginx is running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Deploy homepage template
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
