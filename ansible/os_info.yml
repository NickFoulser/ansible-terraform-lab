---
- name: Demonstrate conditionals
  hosts: all
  gather_facts: true

  tasks:

    - name: Debian message
      ansible.builtin.debug:
        msg: "I am running on a Debian family system."
      when:
        - ansible_facts['os_family'] == 'Debian'

    - name: RedHat message
      ansible.builtin.debug:
        msg: "I am running on a RedHat family system."
      when:
        - ansible_facts['os_family'] == 'RedHat'
